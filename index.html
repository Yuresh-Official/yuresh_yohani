<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Yohani ❤️</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        h1 { color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); font-size: 2.5rem; }

        .btn-container { margin-top: 30px; display: flex; gap: 20px; }

        button {
            padding: 15px 30px;
            font-size: 20px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        #yesBtn { background-color: #ff4757; color: white; }
        #yesBtn:hover { transform: scale(1.1); background-color: #ff6b81; }

        #noBtn { background-color: #57606f; color: white; position: absolute; }

        #message {
            display: none;
            margin-top: 20px;
            font-size: 24px;
            color: #fff;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1 id="question">මගෙ රත්තරන් Yohani, ඔයා මට ආදරෙයිද? ❤️</h1>
    
    <div class="btn-container">
        <button id="yesBtn" onclick="celebrate()">ඔව්! ❤️</button>
        <button id="noBtn" onmouseover="moveButton()">නැ</button>
    </div>

    <div id="message">මම දන්නවා ඔයා මට ආදරෙයි කියලා! මන් ඔයාට ගොඩක් ආදරෙයි මගෙ රත්තරන් Yohani! 😘</div>

    <script>
        function moveButton() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 100);
            btn.style.left = x + "px";
            btn.style.top = y + "px";
        }

        function celebrate() {
            document.getElementById('question').style.display = 'none';
            document.getElementById('yesBtn').style.display = 'none';
            document.getElementById('noBtn').style.display = 'none';
            document.getElementById('message').style.display = 'block';
            document.body.style.background = 'linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%)';
        }
    </script>
</body>
</html>

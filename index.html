<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yohani & Yuresh ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.6);
            --text-color: #f8fafc;
            --accent-color: #f43f5e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle, #1e1b4b 0%, #0f172a 100%);
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 30px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 { font-size: 1.8rem; margin-bottom: 5px; }
        .names { color: var(--accent-color); font-weight: 600; }
        p { opacity: 0.8; margin-bottom: 20px; font-size: 0.9rem; }

        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .time-box { background: rgba(0,0,0,0.3); padding: 10px 5px; border-radius: 12px; }
        .time-val { font-size: 1.1rem; font-weight: bold; display: block; }
        .time-label { font-size: 0.5rem; text-transform: uppercase; opacity: 0.7; }

        .extra-info { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; margin-top: 10px; }
        .val-text { color: var(--accent-color); font-weight: bold; font-size: 0.9rem; }
        
        marquee { margin-top: 10px; font-size: 0.8rem; color: #cbd5e1; font-style: italic; }

        .heart { position: absolute; color: var(--accent-color); font-size: 20px; animation: fall linear infinite; z-index: 1; }
        @keyframes fall { to { transform: translateY(100vh); } }
    </style>
</head>
<body>

    <div class="container">
        <h1><span class="names">Yohani</span> & <span class="names">Yuresh</span></h1>
        <p>Our journey began on June 5, 2026</p>
        
        <div class="timer-grid" id="timer"></div>

        <div class="extra-info">
            <div class="val-text" id="valentineCount"></div>
            <marquee behavior="scroll" direction="left">Every second with you is a beautiful dream come true... I love you more than words can say!</marquee>
        </div>
    </div>

    <script>
        // Falling hearts
        function createHeart() {
            const h = document.createElement('div');
            h.innerHTML = '❤️';
            h.className = 'heart';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.animationDuration = Math.random() * 3 + 4 + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 7000);
        }
        setInterval(createHeart, 800);

        function updateDisplay() {
            // Journey Timer
            const start = new Date("June 5, 2026 00:00:00");
            const now = new Date();
            let diff = now - start;
            
            let totalDays = Math.floor(diff / (1000 * 60 * 60 * 24));
            let hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            let mins = Math.floor((diff / (1000 * 60)) % 60);
            let secs = Math.floor((diff / 1000) % 60);

            document.getElementById("timer").innerHTML = `
                <div class="time-box"><span class="time-val">${totalDays}</span><span class="time-label">Days</span></div>
                <div class="time-box"><span class="time-val">${hours}</span><span class="time-label">Hours</span></div>
                <div class="time-box"><span class="time-val">${mins}</span><span class="time-label">Mins</span></div>
                <div class="time-box"><span class="time-val">${secs}</span><span class="time-label">Secs</span></div>
            `;

            // Valentine's Countdown
            const nextValentine = new Date("February 14, 2027 00:00:00");
            let vDiff = nextValentine - now;
            let vDays = Math.floor(vDiff / (1000 * 60 * 60 * 24));
            document.getElementById("valentineCount").innerText = `Days until Valentine's Day: ${vDays} days left!`;
        }
        setInterval(updateDisplay, 1000);
        updateDisplay();
    </script>
</body>
</html>

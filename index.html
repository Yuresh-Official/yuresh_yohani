<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Love Album for Yohani ❤️</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #ffdee9; font-family: 'Arial', sans-serif; }
        .album-card { width: 350px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; }
        .photo { width: 100%; height: 350px; background-size: cover; background-position: center; border-radius: 15px; border: 5px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: #d63031; margin-top: 15px; }
        button { margin-top: 20px; padding: 10px 25px; border: none; border-radius: 20px; background: #ff4757; color: white; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #ff6b81; }
    </style>
</head>
<body>

    <div class="album-card">
        <div id="photoContainer" class="photo" style="background-image: url('https://i.ibb.co/zYNqjSL/IMG-20260612-WA0031-1.jpg');"></div>
        <h2 id="caption">මගෙ රත්තරන් Yohani ❤️</h2>
        <button onclick="nextPhoto()">ඊළඟ මතකය ➡️</button>
    </div>

    <script>
        const photos = [
            { url: 'https://i.ibb.co/zYNqjSL/IMG-20260612-WA0031-1.jpg', text: 'මගෙ රත්තරන් Yohani ❤️' },
            { url: 'https://i.ibb.co/zHPDRBqX/IMG-20260612-WA0024.jpg', text: 'අපේ ලස්සන මතකයන්...' },
            { url: 'https://i.ibb.co/ZzFrvB5F/IMG-20260704-WA0028.jpg', text: 'ඔයා මගෙ ලෝකයයි! 😘' }
        ];
        
        let index = 0;
        function nextPhoto() {
            index = (index + 1) % photos.length;
            document.getElementById('photoContainer').style.backgroundImage = `url('${photos[index].url}')`;
            document.getElementById('caption').innerText = photos[index].text;
        }
    </script>
</body>
</html>

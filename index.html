<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Fingerprint Scanner ❤️</title>
    <style>
        body { background: #1a1a2e; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .scanner-box { text-align: center; background: #16213e; padding: 30px; border-radius: 30px; box-shadow: 0 0 20px rgba(255, 71, 87, 0.5); }
        #fingerprint { font-size: 80px; color: #ff4757; cursor: pointer; transition: 0.3s; }
        #fingerprint:active { color: #00b894; transform: scale(0.95); }
        #bar { width: 200px; height: 10px; background: #333; margin: 20px auto; border-radius: 5px; overflow: hidden; display: none; }
        #progress { width: 0%; height: 100%; background: #00b894; }
        #result { margin-top: 20px; font-size: 20px; color: #ff7675; font-weight: bold; }
    </style>
</head>
<body>

    <div class="scanner-box">
        <h2>ආදරේ ස්කෑනර් එක ❤️</h2>
        <p>ඔයාගේ ඇඟිල්ල මෙතන තියන් ඉන්න...</p>
        
        <!-- ෆින්ගර් ප්‍රින්ට් අයිකන් එක -->
        <div id="fingerprint" onmousedown="startScan()" onmouseup="stopScan()" ontouchstart="startScan()" ontouchend="stopScan()">
            👆
        </div>

        <div id="bar"><div id="progress"></div></div>
        <div id="result"></div>
    </div>

    <script>
        let interval;
        let progress = 0;

        function startScan() {
            document.getElementById('bar').style.display = 'block';
            document.getElementById('result').innerText = "ස්කෑන් වෙමින් පවතී...";
            interval = setInterval(() => {
                if (progress < 100) {
                    progress++;
                    document.getElementById('progress').style.width = progress + "%";
                } else {
                    clearInterval(interval);
                    document.getElementById('result').innerHTML = "ආදරේ මට්ටම: 100%<br>මන් ඔයාට ගොඩක් ආදරෙයි මගෙ රත්තරන් Yohani! ❤️";
                }
            }, 30);
        }

        function stopScan() {
            if (progress < 100) {
                clearInterval(interval);
                progress = 0;
                document.getElementById('progress').style.width = "0%";
                document.getElementById('bar').style.display = 'none';
                document.getElementById('result').innerText = "ඇඟිල්ල අයින් කරන්න එපා!";
            }
        }
    </script>
</body>
</html>

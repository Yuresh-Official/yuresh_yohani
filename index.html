<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Yohani ❤️</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --heart-color: #f43f5e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            z-index: 2;
            border: 1px solid rgba(255,255,255,0.1);
            width: 85%;
            max-width: 400px;
        }

        h1 { font-size: 2rem; margin-bottom: 10px; background: linear-gradient(to right, #f43f5e, #fb7185); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .timer { font-size: 1.2rem; font-weight: bold; margin: 25px 0; padding: 20px; background: rgba(0,0,0,0.2); border-radius: 15px; line-height: 1.6; }

        .heart-icon { font-size: 50px; animation: heartbeat 1.5s infinite; }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .heart { position: absolute; top: -10px; color: var(--heart-color); font-size: 20px; animation: fall linear infinite; z-index: 1; }
        @keyframes fall { to { transform: translateY(100vh); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart-icon">❤️</div>
        <h1>My Dearest Yohani</h1>
        <p>Our journey together has been:</p>
        <div class="timer" id="timer">Loading...</div>
    </div>

    <script>
        function createHeart() {
            const h = document.createElement('div');
            h.innerHTML = '❤️';
            h.className = 'heart';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.animationDuration = Math.random() * 3 + 3 + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 6000);
        }
        setInterval(createHeart, 400);

        function updateTimer() {
            const start = new Date("June 5, 2026 00:00:00");
            const now = new Date();
            const diff = now - start;
            
            const days = Math.floor(diff / (1000*60*60*24));
            const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
            const mins = Math.floor((diff % (1000*60*60)) / (1000*60));
            const secs = Math.floor((diff % (1000*60)) / 1000);
            
            document.getElementById("timer").innerHTML = 
                `${days} Days, ${hours} Hours<br>${mins} Minutes, ${secs} Seconds`;
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Yohani ❤️</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #ffdee9;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* හදවත් වැටෙන ඇනිමේෂන් එක */
        .heart {
            position: absolute;
            color: #ff4757;
            font-size: 20px;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh); }
        }

        h1 { color: #d63031; font-size: 2.5rem; z-index: 10; text-align: center; }

        .btn-container { z-index: 10; margin-top: 50px; }

        button {
            padding: 15px 40px;
            font-size: 20px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            margin: 10px;
        }

        #yesBtn { background-color: #00b894; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        #noBtn { background-color: #d63031; color: white; position: absolute; }
    </style>
</head>
<body>

    <h1 id="question">මගෙ රත්තරන් Yohani, ඔයා මට ආදරෙයිද? ❤️</h1>
    
    <div class="btn-container">
        <button id="yesBtn" onclick="showLove()">ඔව්! ❤️</button>
        <button id="noBtn" onmouseover="moveButton()">නැ</button>
    </div>

    <script>
        // හදවත් වැටෙන ෆන්ෂන් එක
        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 300);

        // "නැ" බොත්තම දුවන එක
        function moveButton() {
            const btn = document.getElementById('noBtn');
            btn.style.left = Math.random() * (window.innerWidth - 100) + "px";
            btn.style.top = Math.random() * (window.innerHeight - 100) + "px";
        }

        // "ඔව්" එබුවහම වෙන දේ
        function showLove() {
            document.body.innerHTML = `
                <h1 style="color: #d63031;">මම දන්නවා ඔයා මට ආදරෙයි කියලා! ❤️</h1>
                <p style="font-size: 30px; font-weight: bold; color: #e84393;">මන් ඔයාට ගොඩක් ආදරෙයි මගෙ රත්තරන් Yohani! 😘</p>
            `;
        }
    </script>
</body>
</html>

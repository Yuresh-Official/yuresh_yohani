<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>Our Love Journey ❤️</title>
    <style>
        body { background: #fdf6f7; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h1 { color: #d63031; }
        .timer { font-size: 24px; font-weight: bold; color: #e84393; margin: 20px 0; }
        .photo { width: 100%; height: 300px; background-size: cover; background-position: center; border-radius: 15px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>අපේ ආදරණීය ගමන ❤️</h1>
        <p>ජූනි 5, 2026 සිට අද දක්වා...</p>
        
        <div class="timer" id="timer">ගණනය කරමින්...</div>

        <div class="photo" style="background-image: url('https://i.ibb.co/zYNqjSL/IMG-20260612-WA0031-1.jpg');"></div>
        <p style="margin-top: 15px;">එකම හදවතක්, එකම ආදරයක්!</p>
    </div>

    <script>
        function updateTimer() {
            const startDate = new Date("June 5, 2026 00:00:00");
            const now = new Date();
            const diff = now - startDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("timer").innerHTML = 
                `${days} දින, ${hours} පැය, ${minutes} මිනිත්තු, ${seconds} තත්පර`;
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>

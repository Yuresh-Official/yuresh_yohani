<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yohani's Love Scanner ❤️</title>
    <style>
        body { background: #ffeef2; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 320px; }
        input { padding: 10px; width: 80%; margin-bottom: 20px; border: 2px solid #ff7675; border-radius: 10px; }
        button { padding: 12px 25px; background: #ff4757; color: white; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }
        #scanner { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-top: 20px; display: none; overflow: hidden; }
        #bar { width: 0%; height: 100%; background: #00b894; }
        #result { margin-top: 20px; font-weight: bold; color: #d63031; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>ආදරේ ස්කෑනර් එක ❤️</h2>
    <input type="text" id="name" placeholder="ඔයාගේ නම ලියන්න...">
    <button onclick="scan()">ස්කෑන් කරන්න</button>
    
    <div id="scanner"><div id="bar"></div></div>
    <div id="result"></div>
</div>

<script>
    function scan() {
        const name = document.getElementById('name').value;
        if(name === "") { alert("කරුණාකර නම ඇතුළත් කරන්න!"); return; }
        
        document.getElementById('scanner').style.display = 'block';
        document.getElementById('result').style.display = 'none';
        let bar = document.getElementById('bar');
        bar.style.width = "0%";
        
        let width = 0;
        let interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                document.getElementById('result').style.display = 'block';
                document.getElementById('result').innerHTML = `ආදරේ මට්ටම: 100%<br>මන් ඔයාට ගොඩක් ආදරෙයි මගෙ රත්තරන් Yohani! ❤️`;
            } else {
                width++;
                bar.style.width = width + "%";
            }
        }, 30);
    }
</script>
</body>
</html>

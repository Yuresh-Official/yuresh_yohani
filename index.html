<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Yohani ❤️</title>
    <style>
        body { margin: 0; background: #ffdee9; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .container { text-align: center; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; }
        .photo { width: 100%; height: 300px; background-size: cover; background-position: center; border-radius: 15px; margin-bottom: 20px; display: none; }
        button { padding: 15px 30px; font-size: 18px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; margin: 10px; transition: 0.3s; }
        #yesBtn { background: #27ae60; color: white; }
        #noBtn { background: #c0392b; color: white; position: absolute; }
        #albumSection { display: none; }
        h1 { color: #d63031; }
    </style>
</head>
<body>

    <div class="container" id="mainDiv">
        <h1 id="question">මගෙ රත්තරන් Yohani, ඔයා මට ආදරෙයිද? ❤️</h1>
        <div id="btnDiv">
            <button id="yesBtn" onclick="startAlbum()">ඔව්! ❤️</button>
            <button id="noBtn" onmouseover="moveBtn()">නැ</button>
        </div>

        <div id="albumSection">
            <div id="photoContainer" class="photo"></div>
            <h2 id="caption">අපේ ලස්සන මතකයන්...</h2>
            <button onclick="nextPhoto()">ඊළඟ මතකය ➡️</button>
        </div>
    </div>

    <script>
        const photos = [
            { url: 'https://i.ibb.co/zYNqjSL/IMG-20260612-WA0031-1.jpg', text: 'මගෙ රත්තරන් Yohani ❤️' },
            { url: 'https://i.ibb.co/zHPDRBqX/IMG-20260612-WA0024.jpg', text: 'අපේ ලස්සන මතකයන්...' },
            { url: 'https://i.ibb.co/ZzFrvB5F/IMG-20260704-WA0028.jpg', text: 'ඔයා මගෙ ලෝකයයි! 😘' }
        ];
        let index = 0;

        function moveBtn() {
            const btn = document.getElementById('noBtn');
            btn.style.left = Math.random() * (window.innerWidth - 100) + "px";
            btn.style.top = Math.random() * (window.innerHeight - 100) + "px";
        }

        function startAlbum() {
            document.getElementById('question').style.display = 'none';
            document.getElementById('btnDiv').style.display = 'none';
            document.getElementById('albumSection').style.display = 'block';
            showPhoto();
        }

        function showPhoto() {
            document.getElementById('photoContainer').style.display = 'block';
            document.getElementById('photoContainer').style.backgroundImage = `url('${photos[index].url}')`;
            document.getElementById('caption').innerText = photos[index].text;
        }

        function nextPhoto() {
            index = (index + 1) % photos.length;
            showPhoto();
        }
    </script>
</body>
</html>

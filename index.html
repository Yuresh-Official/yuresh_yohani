<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yohani & Yuresh ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.6);
            --text-color: #f8fafc;
            --accent-color: #f43f5e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle, #1e1b4b 0%, #0f172a 100%);
        }

        .container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            animation: fadeIn 2s ease-in;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        h1 { font-size: 2rem; margin-bottom: 5px; }
        .names { color: var(--accent-color); font-weight: 600; text-shadow: 0 0 10px rgba(244, 63, 94, 0.5); }
        p { opacity: 0.8; margin-bottom: 25px; }

        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .time-box { background: rgba(0,0,0,0.3); padding: 15px 5px; border-radius: 15px; transition: 0.3s; }
        .time-box:hover { transform: translateY(-5px); background: rgba(244, 63, 94, 0.2); }
        .time-val { font-size: 1.2rem; font-weight: bold; display: block; color: #fff; }
        .time-label { font-size: 0.6rem; text-transform: uppercase; opacity: 0.7; letter-spacing: 1px; }

        .heart { position: absolute; color: var(--accent-color); font-size: 20px; animation: fall linear infinite; z-index: 1; }
        @keyframes fall { to { transform: translateY(100vh); } }
    </style>
</head>
<body>

    <div class="container">
        <h1><span class="names">Yohani</span> & <span class="names">Yuresh</span></h1>
        <p>Our journey began on June 5, 2026</p>
        
        <div class="timer-grid" id="timer"></div>
    </div>

    <script>
        // Falling hearts animation
        function createHeart() {
            const h = document.createElement('div');
            h.innerHTML = '❤️';
            h.className = 'heart';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.animationDuration = Math.random() * 3 + 4 + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 7000);
        }
        setInterval(createHeart, 500);

        // Timer update
        function updateTimer() {
            const start = new Date("June 5, 2026 00:00:00");
            const now = new Date();
            let diff = now - start;
            
            let totalDays = Math.floor(diff / (1000 * 60 * 60 * 24));
            let hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            let mins = Math.floor((diff / (1000 * 60)) % 60);
            let secs = Math.floor((diff / 1000) % 60);

            document.getElementById("timer").innerHTML = `
                <div class="time-box"><span class="time-val">${totalDays}</span><span class="time-label">Days</span></div>
                <div class="time-box"><span class="time-val">${hours}</span><span class="time-label">Hours</span></div>
                <div class="time-box"><span class="time-val">${mins}</span><span class="time-label">Mins</span></div>
                <div class="time-box"><span class="time-val">${secs}</span><span class="time-label">Secs</span></div>
            `;
        }
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
